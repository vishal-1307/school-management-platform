services:
  - type: web
    name: knowledge-academy-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    # Migrations run in the start command because the free tier has no
    # pre-deploy hook; single instance, so there is no migration race.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      # Paste the *pooled* Neon connection string (postgresql://...).
      # sslmode/channel_binding params are handled automatically.
      - key: DATABASE_URL
        sync: false
      # Signs session tokens. Auto-generated; copy the SAME value into
      # Vercel's SECRET_KEY env var so the frontend middleware can verify
      # sessions too.
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://school-management-platform-five.vercel.app"]'
      # Idempotent demo seed (accounts + walkthrough data — see
      # DEMO_CREDENTIALS.md). Off by default — a security audit found this
      # was left "true" with the bootstrap admin's password hardcoded and
      # publicly documented, so anyone could log into the live admin portal.
      # Only set to "true" temporarily to (re)seed a fresh/demo database,
      # then set back to "false".
      - key: SEED_ON_START
        value: "false"
      # Real password for the bootstrap `admin` super-admin login (see
      # app/scripts/seed_prod.py) — pick a strong value yourself; never
      # reuse the old publicly-documented "Admin@2026" default.
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      # AI Assistant add-on — paste the DigitalOcean Serverless Inference
      # model access key; feature stays off (403) until this is set AND
      # the admin enables it under Settings → Features.
      - key: DO_MODEL_ACCESS_KEY
        sync: false
      # Add later via dashboard when provisioned (all optional at boot):
      # RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET, RAZORPAY_WEBHOOK_SECRET,
      # CLOUDINARY_URL, WHATSAPP_TOKEN, WHATSAPP_PHONE_ID
