name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Import check
        run: python -c "from app.main import app; print('routes:', len(app.routes))"
      - name: Migration chain applies from empty
        run: DATABASE_URL="sqlite+aiosqlite:///./ci_scratch.db" alembic upgrade head
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (dev-auth mode)
        run: npm run build
        env:
          PUBLIC_DEV_AUTH: "true"
          PUBLIC_API_URL: "https://example.onrender.com"
